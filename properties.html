<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuxEstate | Properties</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary" href="index.html"><i class="bi bi-building"></i> LuxEstate</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="properties.html">Properties</a></li>
          <li class="nav-item"><a class="nav-link" href="agents.html">Agents</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row g-4">
      <!-- Filter Sidebar -->
      <div class="col-lg-3">
        <div class="card p-4 shadow-sm sticky-top" style="top: 80px;">
          <h5 class="mb-3 fw-bold">Filters</h5>
          <form id="filterForm">
            <div class="mb-3"><label>Status</label><select class="form-select" id="status"><option value="all">All</option><option value="sale">For Sale</option><option value="rent">For Rent</option></select></div>
            <div class="mb-3"><label>Type</label><select class="form-select" id="type"><option value="all">All</option><option value="house">House</option><option value="commercial">Commercial</option><option value="land">Land</option></select></div>
            <div class="mb-3"><label>Bedrooms</label><select class="form-select" id="beds"><option value="0">Any</option><option value="1">1+</option><option value="2">2+</option><option value="3">3+</option><option value="4">4+</option></select></div>
            <div class="mb-3"><label>Max Price ($)</label><input type="range" class="form-range" id="price" min="0" max="1000000" step="50000" value="1000000"><span id="priceVal" class="text-muted">$1,000,000</span></div>
            <div class="mb-3"><label>Location</label><input type="text" class="form-control" id="location" placeholder="City, Area"></div>
            <button type="button" class="btn btn-primary w-100" onclick="applyFilters()">Apply Filters</button>
          </form>
        </div>
      </div>

      <!-- Results -->
      <div class="col-lg-9">
        <div class="row g-4" id="propertyGrid">
          <!-- Property 1 -->
          <div class="col-md-6 col-lg-4 property-card" data-status="sale" data-type="house" data-beds="3" data-price="450000" data-location="Downtown">
            <div class="card h-100 shadow-sm"><img src="https://placehold.co/400x250/0f4c75/ffffff?text=House+1" class="card-img-top"><div class="card-body"><span class="badge bg-success mb-2">For Sale</span><h5>Modern Family Home</h5><p class="text-muted mb-1">3 Beds • 2 Baths</p><p class="fw-bold text-gold">$450,000</p><a href="property-detail.html" class="btn btn-outline-primary btn-sm">View Details</a></div></div>
          </div>
          <!-- Property 2 -->
          <div class="col-md-6 col-lg-4 property-card" data-status="rent" data-type="commercial" data-beds="0" data-price="2500" data-location="Business District">
            <div class="card h-100 shadow-sm"><img src="https://placehold.co/400x250/c9a227/ffffff?text=Office+Space" class="card-img-top"><div class="card-body"><span class="badge bg-info mb-2">For Rent</span><h5>Downtown Office</h5><p class="text-muted mb-1">Open Plan • 1 Bath</p><p class="fw-bold text-gold">$2,500/mo</p><a href="property-detail.html" class="btn btn-outline-primary btn-sm">View Details</a></div></div>
          </div>
          <!-- Add more cards as needed -->
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
