<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuxEstate | Property Detail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- SEO Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "RealEstateListing",
    "name": "Modern Family Home",
    "description": "Beautiful 3-bedroom house with modern amenities",
    "image": "https://placehold.co/600x400",
    "price": "450000",
    "priceCurrency": "USD",
    "address": {"@type": "PostalAddress", "addressLocality": "Downtown"}
  }
  </script>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary" href="index.html"><i class="bi bi-building"></i> LuxEstate</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="properties.html">Properties</a></li>
          <li class="nav-item"><a class="nav-link" href="agents.html">Agents</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <!-- Gallery -->
    <div id="propCarousel" class="carousel slide mb-4 shadow rounded-3" data-bs-ride="carousel">
      <div class="carousel-inner">
        <div class="carousel-item active"><img src="https://placehold.co/1200x500/0f4c75/ffffff?text=Main+View" class="d-block w-100"></div>
        <div class="carousel-item"><img src="https://placehold.co/1200x500/c9a227/ffffff?text=Kitchen" class="d-block w-100"></div>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-lg-8">
        <h2 class="fw-bold">Modern Family Home</h2>
        <p class="text-gold fs-4 fw-bold mb-3">$450,000 • Downtown</p>
        <div class="row mb-4 text-center">
          <div class="col-4"><i class="bi bi-door-open fs-4"></i><p>3 Beds</p></div>
          <div class="col-4"><i class="bi bi-water fs-4"></i><p>2 Baths</p></div>
          <div class="col-4"><i class="bi bi-rulers fs-4"></i><p>1,850 sqft</p></div>
        </div>
        <h5>Video Tour</h5>
        <div class="ratio ratio-16x9 mb-4"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe></div>
      </div>

      <div class="col-lg-4">
        <div class="card p-3 shadow-sm sticky-top" style="top: 80px;">
          <h5>Agent Profile</h5>
          <div class="d-flex align-items-center mb-3">
            <img src="https://placehold.co/60x60/2c3e50/ffffff?text=JD" class="rounded-circle me-2">
            <div><h6 class="mb-0">John Doe</h6><small class="text-muted">Senior Agent</small></div>
          </div>
          <a href="https://wa.me/1234567890?text=Hi%20John,%20I'm%20interested%20in%20Modern%20Family%20Home" class="btn btn-success w-100 mb-2"><i class="bi bi-whatsapp"></i> WhatsApp</a>
          <button class="btn btn-outline-primary w-100" data-bs-toggle="modal" data-bs-target="#leadModal">Request Viewing</button>
        </div>
      </div>
    </div>

    <!-- Map -->
    <div class="mt-5">
      <h4>Location</h4>
      <div class="ratio ratio-21x9 shadow rounded-3 overflow-hidden">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3023.9503398796587!2d-73.98731968482413!3d40.75803127933853!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c25855c6480299%3A0x55194ec5a1ae072e!2sTimes%20Square!5e0!3m2!1sen!2sus!4v1620000000000" style="border:0;" allowfullscreen loading="lazy"></iframe>
      </div>
    </div>
  </div>

  <!-- Lead Capture Modal -->
  <div class="modal fade" id="leadModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Request Viewing</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <form class="lead-form">
          <div class="mb-3"><input type="text" class="form-control" placeholder="Full Name" required></div>
          <div class="mb-3"><input type="email" class="form-control" placeholder="Email" required></div>
          <div class="mb-3"><input type="tel" class="form-control" placeholder="Phone" required></div>
          <div class="mb-3"><textarea class="form-control" rows="3" placeholder="Message"></textarea></div>
          <button type="submit" class="btn btn-gold w-100">Submit Request</button>
        </form>
      </div>
    </div></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
